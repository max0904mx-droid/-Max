<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Vision AI | 拍照解題專家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .preview-img { max-height: 150px; object-fit: contain; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-camera"></i></div>
            <h1 class="font-bold text-gray-800">學業拍照解題 <span class="text-blue-600 text-xs">v2.5</span></h1>
        </div>
        <div class="text-xs font-bold text-gray-400">僅限學術用途</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll">
        <div class="max-w-3xl mx-auto space-y-4" id="messages">
            <div class="flex justify-start">
                <div class="bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-600 max-w-[85%]">
                    你好！我是學業 AI 專家。你可以直接輸入問題，或是**拍照、上傳題目圖片**，我會幫你分析並解題。
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t p-4">
        <div class="max-w-3xl mx-auto">
            <div id="image-preview-container" class="hidden mb-3 relative inline-block">
                <img id="image-preview" src="" class="rounded-lg border shadow-sm preview-img">
                <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center">✕</button>
            </div>

            <div class="flex items-end space-x-2">
                <div class="flex-shrink-0">
                    <label class="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-600 w-12 h-12 rounded-xl flex items-center justify-center transition">
                        <i class="fas fa-image text-xl"></i>
                        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="previewImage(this)">
                    </label>
                </div>

                <div class="flex-1 relative">
                    <textarea id="user-text" rows="1" placeholder="詢問關於學業的問題..." class="w-full bg-slate-100 p-3 pr-10 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>
                </div>

                <button onclick="handleSend()" id="send-btn" class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center hover:bg-blue-700 transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const API_KEY = "YOUR_GEMINI_API_KEY"; // 貼上你的 Gemini API Key
        let selectedImageData = null;

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageData = e.target.result.split(',')[1]; // 取出 Base64
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage() {
            selectedImageData = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        async function handleSend() {
            const textEl = document.getElementById('user-text');
            const text = textEl.value.trim();
            if (!text && !selectedImageData) return;

            // 1. 介面更新
            appendMessage('user', text, selectedImageData);
            const loadingId = appendMessage('ai', 'AI 正在分析您的題目...');
            
            // 清空輸入
            textEl.value = "";
            clearImage();

            try {
                // 2. 準備多模態 payload (同時傳送文字與圖片)
                const contents = [{
                    parts: [{ text: `你是一位學術專家。你的任務是回答學業問題。如果是圖片中的題目，請提供詳細的步驟、解答與相關觀念說明。問題如下：${text}` }]
                }];

                if (selectedImageData) {
                    contents[0].parts.push({
                        inline_data: { mime_type: "image/jpeg", data: selectedImageData }
                    });
                }

                // 3. 呼叫 Gemini 1.5 Flash (速度快且支援視覺)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                updateMessage(loadingId, aiResponse);

            } catch (error) {
                updateMessage(loadingId, "⚠️ 連線錯誤，請確認 API Key 是否有效。");
            }
        }

        function appendMessage(role, text, imageData) {
            const id = 'msg-' + Date.now();
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            let contentHtml = role === 'user' 
                ? `<div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-sm">
                    ${imageData ? `<img src="data:image/jpeg;base64,${imageData}" class="rounded-lg mb-2 max-w-full">` : ''}
                    <p class="text-sm">${text}</p>
                   </div>`
                : `<div class="bg-white border p-4 rounded-2xl rounded-tl-none max-w-[90%] shadow-sm">
                    <p id="${id}" class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">${text}</p>
                   </div>`;
            
            div.innerHTML = contentHtml;
            container.appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            return id;
        }

        function updateMessage(id, text) {
            document.getElementById(id).innerText = text;
        }
    </script>
</body>
</html>
