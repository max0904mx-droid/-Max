<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Yu chen Al</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#252525;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.04);--t:#f0f0f0;--t2:#888;--mu:#444;--ac:#7c6af0;--acs:rgba(124,106,240,.15);--gr:#34d399;--ye:#fbbf24;--re:#f87171;--bl:#60a5fa}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;overflow:hidden}
.app{width:100%;max-width:420px;height:100vh;max-height:900px;margin:0 auto;background:var(--bg);border-left:1px solid var(--bd);border-right:1px solid var(--bd);position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── SCREENS ── */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.32,.72,0,1),opacity .25s}
.hid{transform:translateX(100%)!important;opacity:0!important;pointer-events:none!important}
.sld-left{transform:translateX(-30%)!important;opacity:0!important;pointer-events:none!important}

/* ══ AUTH ══ */
#sa{background:radial-gradient(ellipse at 55% 0%,rgba(124,106,240,.16),transparent 60%),var(–bg);justify-content:flex-end}
.a-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 32px 32px}
.a-paw{font-size:54px;filter:drop-shadow(0 0 24px rgba(124,106,240,.5))}
.a-logo{font-family:‘DM Serif Display’,serif;font-size:36px;font-style:italic;line-height:1;text-align:center}
.a-logo em{color:var(–ac);font-style:normal}
.a-tag{font-size:14px;color:var(–t2);text-align:center;line-height:1.65;max-width:240px}
.a-pan{background:var(–s1);border-top:1px solid var(–bd);border-radius:24px 24px 0 0;padding:28px 24px 44px}
.a-tabs{display:flex;background:var(–s2);border-radius:10px;padding:3px;margin-bottom:22px}
.a-tab{flex:1;padding:9px;border:none;border-radius:8px;background:transparent;color:var(–t2);font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.a-tab.on{background:var(–s3);color:var(–t)}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(–mu);margin-bottom:6px;display:block}
.fi{width:100%;padding:12px 14px;background:#161616;border:1px solid var(–bd);border-radius:10px;color:var(–t);font-family:‘DM Sans’,sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus{border-color:rgba(124,106,240,.5)}
.btn-main{width:100%;padding:14px;background:var(–ac);color:#fff;border:none;border-radius:12px;font-family:‘DM Sans’,sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:all .2s}
.btn-main:active{transform:scale(.98)}

/* ══ ONBOARD ══ */
#sob{background:var(–bg)}
.ob-hd{display:flex;align-items:center;justify-content:space-between;padding:52px 22px 0;flex-shrink:0}
.ob-skip{font-size:14px;color:var(–mu);background:none;border:none;cursor:pointer}
.ob-dots{display:flex;gap:6px}
.ob-dot{width:6px;height:6px;border-radius:3px;background:var(–s3);transition:all .3s}
.ob-dot.on{width:20px;background:var(–ac)}
.ob-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:18px}
.ob-icon{font-size:60px}
.ob-title{font-family:‘DM Serif Display’,serif;font-size:26px;font-style:italic;line-height:1.2}
.ob-desc{font-size:14px;color:var(–t2);line-height:1.7;max-width:280px}
.ob-foot{padding:20px 24px 44px;flex-shrink:0}
.ob-btn{width:100%;padding:15px;background:var(–ac);color:#fff;border:none;border-radius:14px;font-family:‘DM Sans’,sans-serif;font-size:16px;font-weight:600;cursor:pointer}

/* ══ CHAT (main) ══ */
#sch{background:var(–bg)}
.ch-hd{display:flex;align-items:center;gap:12px;padding:52px 20px 14px;flex-shrink:0;border-bottom:1px solid var(–bd2)}
.ch-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(–ac),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ch-name{font-family:‘DM Serif Display’,serif;font-size:17px;font-style:italic}
.ch-name em{color:var(–ac);font-style:normal}
.ch-online{font-size:11px;color:var(–gr)}
.h-dot{width:7px;height:7px;border-radius:50%;background:var(–gr);box-shadow:0 0 6px var(–gr);animation:pu 2s ease infinite;margin-left:auto}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.ch-nav-row{display:flex;gap:8px;padding:10px 16px 8px;overflow-x:auto;flex-shrink:0}
.ch-nav-row::-webkit-scrollbar{display:none}
.nav-chip{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(–s1);border:1px solid var(–bd);border-radius:100px;padding:7px 14px;cursor:pointer;transition:all .2s;font-size:12px;font-weight:500;color:var(–t2)}
.nav-chip:hover{border-color:var(–ac);color:var(–t)}
.nav-chip.on{border-color:var(–ac);background:var(–acs);color:var(–ac)}
.ch-msgs{flex:1;overflow-y:auto;padding:12px 16px 8px}
.ch-msgs::-webkit-scrollbar{display:none}
.ts{font-size:10px;color:var(–mu);text-align:center;margin:10px 0 6px}
.mg{margin-bottom:14px;display:flex;flex-direction:column}
.mg.u{align-items:flex-end}
.mg.ai{align-items:flex-start}
.bb{max-width:86%;padding:12px 16px;font-size:14px;line-height:1.65;animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bb.u{background:#1c1c2e;border:1px solid rgba(124,106,240,.18);border-radius:18px 18px 4px 18px;color:var(–t)}
.bb.ai{background:var(–s1);border:1px solid var(–bd);border-radius:18px 18px 18px 4px;color:var(–t)}
.bb.ai h2{font-family:‘DM Serif Display’,serif;font-size:19px;font-style:italic;margin-bottom:6px;line-height:1.3}
.bb-div{height:1px;background:var(–bd);margin:12px 0}
.bb-sec{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(–ac);margin-bottom:8px}
.bb-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.bb-list li{display:flex;gap:8px;font-size:13px;line-height:1.5}
.bb-list li::before{content:’–’;color:var(–ac);flex-shrink:0}
/* quick replies */
.qr-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.qr{background:transparent;border:1px solid var(–bd);border-radius:100px;padding:7px 14px;font-size:13px;color:var(–t2);cursor:pointer;transition:all .2s;font-family:‘DM Sans’,sans-serif}
.qr:hover{border-color:var(–ac);color:var(–ac);background:var(–acs)}
/* media in chat */
.media-thumb{border-radius:14px;overflow:hidden;max-width:220px;margin-bottom:4px;border:1px solid var(–bd)}
.media-thumb img,.media-thumb video{width:100%;display:block}
.media-file{background:var(–s2);border:1px solid var(–bd);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px;font-size:13px;max-width:220px}
/* metrics inside bubble */
.bb-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.bb-m{background:rgba(255,255,255,.04);border:1px solid var(–bd);border-radius:10px;padding:10px 12px}
.bb-mv{font-family:‘DM Serif Display’,serif;font-size:20px;line-height:1}
.bb-ml{font-size:11px;color:var(–t2);margin-top:3px}
.bb-bars{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.bb-br{display:flex;align-items:center;gap:10px}
.bb-bl{font-size:12px;width:50px;color:var(–t2)}
.bb-bt{flex:1;height:6px;background:var(–s2);border-radius:100px;overflow:hidden}
.bb-bf{height:100%;border-radius:100px}
.bb-bp{font-size:11px;color:var(–mu);width:28px;text-align:right}
.rp{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;display:inline-block}
.rl{background:rgba(52,211,153,.12);color:var(–gr)}
.rm{background:rgba(251,191,36,.12);color:var(–ye)}
.rh{background:rgba(248,113,113,.12);color:var(–re)}
.bb-action{display:flex;gap:8px;margin-top:10px}
.bb-btn-acc{flex:1;padding:10px;background:var(–ac);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif}
.bb-btn-sec{flex:1;padding:10px;background:var(–s2);border:1px solid var(–bd);color:var(–t);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:‘DM Sans’,sans-serif}
/* typing */
.ty-wrap{background:var(–s1);border:1px solid var(–bd);border-radius:18px 18px 18px 4px;padding:12px 16px;display:inline-flex;gap:4px}
.ty-d{width:6px;height:6px;border-radius:50%;background:var(–mu);animation:tb 1.2s ease infinite}
.ty-d:nth-child(2){animation-delay:.15s}.ty-d:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* input area */
.ch-in{flex-shrink:0;padding:8px 14px 28px;border-top:1px solid var(–bd2)}
.up-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 0 8px}
.uc{display:flex;align-items:center;gap:5px;background:var(–s2);border:1px solid var(–bd);border-radius:8px;padding:5px 10px;font-size:12px;color:var(–t2);cursor:pointer}
.in-row{display:flex;align-items:center;gap:8px}
.plus-btn{width:40px;height:40px;border-radius:50%;background:var(–s2);border:1px solid var(–bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(–t2);flex-shrink:0;transition:all .2s;line-height:1}
.plus-btn:hover{background:var(–s3);color:var(–t)}
.in-pill{flex:1;display:flex;align-items:center;background:#161616;border:1px solid var(–bd);border-radius:22px;padding:0 14px;gap:8px;height:44px;transition:border-color .2s}
.in-pill:focus-within{border-color:rgba(124,106,240,.5)}
.in-text{flex:1;background:transparent;border:none;outline:none;color:var(–t);font-family:‘DM Sans’,sans-serif;font-size:15px;caret-color:var(–ac)}
.in-text::placeholder{color:var(–mu)}
.mic-btn{background:none;border:none;cursor:pointer;color:var(–mu);font-size:16px;padding:2px;transition:color .2s}
.mic-btn:hover{color:var(–t2)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(–ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;opacity:0;pointer-events:none;transition:all .2s}
.send-btn.show{opacity:1;pointer-events:all}
.send-btn:hover{background:#6b5ce7;transform:scale(1.05)}
#fi{display:none}

/* ══ RECORDS ══ */
#srec{background:var(–bg)}
.pg-hd{display:flex;align-items:center;gap:12px;padding:52px 20px 16px;flex-shrink:0}
.bk-btn{width:36px;height:36px;border-radius:50%;background:var(–s1);border:1px solid var(–bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.pg-title{font-family:‘DM Serif Display’,serif;font-size:22px;font-style:italic}
.pg-scroll{flex:1;overflow-y:auto;padding:8px 20px 40px}
.pg-scroll::-webkit-scrollbar{display:none}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center;gap:12px;flex:1}
.empty-icon{font-size:48px;opacity:.4}
.empty-title{font-family:‘DM Serif Display’,serif;font-size:20px;font-style:italic;color:var(–t2)}
.empty-desc{font-size:13px;color:var(–mu);line-height:1.6;max-width:240px}
.rec-item{background:var(–s1);border:1px solid var(–bd);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.rec-item:hover{background:var(–s2)}
.rec-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rec-cat-av{width:32px;height:32px;border-radius:50%;background:var(–s2);display:flex;align-items:center;justify-content:center;font-size:18px}
.rec-cat-name{font-size:14px;font-weight:600}
.rec-date{font-size:11px;color:var(–mu);margin-top:1px}
.rec-stress{font-family:‘DM Serif Display’,serif;font-size:22px;margin-left:auto}
.rec-summary{font-size:13px;color:var(–t2);line-height:1.5;margin-bottom:10px}
.rec-tags{display:flex;gap:6px;flex-wrap:wrap}
.rec-tag{font-size:11px;padding:3px 10px;border-radius:100px;background:var(–s2);border:1px solid var(–bd)}

/* ══ CATS ══ */
#scats{background:var(–bg)}
.cat-list{flex:1;overflow-y:auto;padding:8px 20px 40px}
.cat-list::-webkit-scrollbar{display:none}
.cat-card{background:var(–s1);border:1px solid var(–bd);border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer;transition:background .15s}
.cat-card:hover{background:var(–s2)}
.cat-card-top{display:flex;align-items:center;gap:14px}
.cat-av-lg{width:52px;height:52px;border-radius:50%;background:var(–s2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.cat-card-info{flex:1}
.cat-card-name{font-family:‘DM Serif Display’,serif;font-size:18px;font-style:italic}
.cat-card-meta{font-size:12px;color:var(–t2);margin-top:2px}
.cat-card-metrics{display:flex;gap:8px;margin-top:12px}
.cat-mini-m{flex:1;background:var(–s2);border-radius:10px;padding:8px;text-align:center}
.cat-mini-v{font-family:‘DM Serif Display’,serif;font-size:16px;line-height:1}
.cat-mini-l{font-size:10px;color:var(–t2);margin-top:2px}

/* ══ BOTTOM NAV ══ */
.b-nav{position:absolute;bottom:0;left:0;right:0;height:72px;background:rgba(10,10,10,.96);border-top:1px solid var(–bd);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-around;padding:0 8px 12px}
.b-ni{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 16px;border-radius:10px;transition:background .15s}
.b-ni:hover{background:var(–s2)}
.b-nic{font-size:20px}
.b-nlb{font-size:10px;font-weight:500;color:var(–mu);margin-top:1px}
.b-ni.on .b-nlb{color:var(–ac)}
</style>

</head>
<body>
<div class="app">

<!-- ══ AUTH ══ -->

<div class="scr" id="sa">
  <div class="a-top">
    <div class="a-paw">🐾</div>
    <div class="a-logo">Yu chen <em>Al</em></div>
    <div class="a-tag">讀懂牠的行為，<br>不只是聽牠叫。</div>
  </div>
  <div class="a-pan">
    <div class="a-tabs">
      <button class="a-tab on" id="tab-r" onclick="swTab('r')">註冊</button>
      <button class="a-tab" id="tab-l" onclick="swTab('l')">登入</button>
    </div>
    <div id="form-r">
      <div class="fg"><label class="fl">電子郵件</label><input class="fi" type="email" placeholder="you@example.com"></div>
      <div class="fg"><label class="fl">密碼</label><input class="fi" type="password" placeholder="至少 8 個字元"></div>
      <button class="btn-main" onclick="goTo('sob')">建立帳號 →</button>
    </div>
    <div id="form-l" style="display:none">
      <div class="fg"><label class="fl">電子郵件</label><input class="fi" type="email" placeholder="you@example.com"></div>
      <div class="fg"><label class="fl">密碼</label><input class="fi" type="password" placeholder="輸入密碼"></div>
      <button class="btn-main" onclick="goTo('sch')">登入 →</button>
    </div>
  </div>
</div>

<!-- ══ ONBOARD ══ -->

<div class="scr hid" id="sob">
  <div class="ob-hd">
    <button class="ob-skip" onclick="goTo('sch')">跳過</button>
    <div class="ob-dots" id="ob-dots"></div>
  </div>
  <div class="ob-body" id="ob-body"></div>
  <div class="ob-foot"><button class="ob-btn" id="ob-btn" onclick="nxOb()">下一步</button></div>
</div>

<!-- ══ CHAT ══ -->

<div class="scr hid" id="sch">
  <div class="ch-hd">
    <div class="ch-av">🐾</div>
    <div>
      <div class="ch-name">Yu chen <em>Al</em></div>
      <div class="ch-online">在線 · 隨時回覆</div>
    </div>
    <div class="h-dot"></div>
  </div>
  <div class="ch-msgs" id="ch-msgs">
    <div class="ts">今天</div>
    <div class="mg ai">
      <div class="bb ai">
        <h2>你好，我是 Yu chen Al 🐾</h2>
        <p style="font-size:13px;color:var(--t2);margin-top:4px">直接拍一段你貓咪的影片或照片給我，<br>我會幫你分析牠的行為與情緒狀態。</p>
        <div class="bb-div"></div>
        <p style="font-size:13px;color:var(--t2)">或者，你也可以直接用文字描述你觀察到的行為。</p>
      </div>
    </div>
  </div>
  <div class="ch-in">
    <div class="up-chips" id="up-chips"></div>
    <div class="in-row">
      <button class="plus-btn" onclick="document.getElementById('fi').click()" title="上傳照片或影片">＋</button>
      <div class="in-pill">
        <input class="in-text" id="in-text" placeholder="想問就問" oninput="onInput()" onkeydown="onKey(event)">
        <button class="mic-btn" title="語音輸入">🎙</button>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
    </div>
    <input type="file" id="fi" accept="image/*,video/*,audio/*" multiple onchange="onFiles(event)">
  </div>
  <div class="b-nav">
    <button class="b-ni on" id="nav-chat" onclick="navTo('sch','nav-chat')"><div class="b-nic">💬</div><div class="b-nlb">對話</div></button>
    <button class="b-ni" id="nav-rec" onclick="navTo('srec','nav-rec')"><div class="b-nic">📋</div><div class="b-nlb">紀錄</div></button>
    <button class="b-ni" id="nav-cats" onclick="navTo('scats','nav-cats')"><div class="b-nic">🐱</div><div class="b-nlb">我的貓</div></button>
  </div>
</div>

<!-- ══ RECORDS ══ -->

<div class="scr hid" id="srec">
  <div class="pg-hd">
    <div class="pg-title">分析紀錄</div>
  </div>
  <div class="pg-scroll" id="rec-list">
    <!-- populated by JS -->
  </div>
  <div class="b-nav">
    <button class="b-ni" id="nav-chat2" onclick="navTo('sch','nav-chat')"><div class="b-nic">💬</div><div class="b-nlb">對話</div></button>
    <button class="b-ni on" id="nav-rec2"><div class="b-nic">📋</div><div class="b-nlb">紀錄</div></button>
    <button class="b-ni" id="nav-cats2" onclick="navTo('scats','nav-cats')"><div class="b-nic">🐱</div><div class="b-nlb">我的貓</div></button>
  </div>
</div>

<!-- ══ CATS ══ -->

<div class="scr hid" id="scats">
  <div class="pg-hd">
    <div class="pg-title">我的貓</div>
    <button onclick="startNewCat()" style="margin-left:auto;background:var(--ac);color:#fff;border:none;border-radius:100px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">＋ 新增</button>
  </div>
  <div class="cat-list" id="cat-list">
    <!-- populated by JS -->
  </div>
  <div class="b-nav">
    <button class="b-ni" onclick="navTo('sch','nav-chat')"><div class="b-nic">💬</div><div class="b-nlb">對話</div></button>
    <button class="b-ni" onclick="navTo('srec','nav-rec')"><div class="b-nic">📋</div><div class="b-nlb">紀錄</div></button>
    <button class="b-ni on"><div class="b-nic">🐱</div><div class="b-nlb">我的貓</div></button>
  </div>
</div>

<script>
// ── STATE ──
var state = {
  cats: [],       // [{id, name, breed, age, gender, neutered, emoji}]
  records: [],    // [{id, catId, date, stress, emotion, risk, summary, tags}]
  flow: null,     // current conversation flow
  flowData: {}    // temp data for active flow
};

// ── NAV ──
var hist = ['sa'];
function goTo(id) {
  var c = hist[hist.length-1];
  if (c === id) return;
  document.getElementById(c).classList.add('hid');
  document.getElementById(id).classList.remove('hid');
  hist.push(id);
}
function goBack() {
  if (hist.length <= 1) return;
  var c = hist.pop();
  document.getElementById(c).classList.add('hid');
  document.getElementById(hist[hist.length-1]).classList.remove('hid');
}
function navTo(screenId, navId) {
  // switch bottom nav active state
  document.querySelectorAll('.b-ni').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('[id^="nav-"]').forEach(function(b){
    if (b.id === navId || b.id === navId+'2') b.classList.add('on');
  });
  goTo(screenId);
  if (screenId === 'srec') renderRecords();
  if (screenId === 'scats') renderCats();
}

// ── AUTH ──
function swTab(t) {
  document.getElementById('tab-r').classList.toggle('on', t==='r');
  document.getElementById('tab-l').classList.toggle('on', t==='l');
  document.getElementById('form-r').style.display = t==='r' ? 'block' : 'none';
  document.getElementById('form-l').style.display = t==='l' ? 'block' : 'none';
}

// ── ONBOARD ──
var OB = [
  {i:'🐾', t:'歡迎來到 Yu chen Al', d:'直接把你的貓咪拍給我看，或用文字描述行為，我立刻幫你分析。'},
  {i:'🔍', t:'文字 + 影片都可以', d:'不需要複雜操作。一句話、一段影片，都能生成完整行為分析報告。'},
  {i:'📊', t:'持續追蹤，不只一次', d:'每次分析都會記錄下來，幫你看見牠情緒與壓力的長期趨勢。'},
  {i:'🐱', t:'每隻貓都有自己的檔案', d:'分析完成後，AI 會問你牠的名字，自動建立完整健康資料庫。'}
];
var obIdx = 0;
function initOb() {
  var dots = document.getElementById('ob-dots');
  dots.innerHTML = OB.map(function(_,i){ return '<div class="ob-dot'+(i===0?' on':'')+'"></div>'; }).join('');
  renderOb();
}
function renderOb() {
  var s = OB[obIdx];
  document.getElementById('ob-body').innerHTML =
    '<div class="ob-icon">'+s.i+'</div>'+
    '<div class="ob-title">'+s.t+'</div>'+
    '<div class="ob-desc">'+s.d+'</div>';
  document.querySelectorAll('.ob-dot').forEach(function(d,i){ d.classList.toggle('on', i===obIdx); });
  document.getElementById('ob-btn').textContent = obIdx===OB.length-1 ? '開始使用 →' : '下一步';
}
function nxOb() {
  if (obIdx < OB.length-1) { obIdx++; renderOb(); }
  else goTo('sch');
}
initOb();

// ── CHAT ──
var pendingFiles = [];
var awaitingAnswer = null; // 'cat_name' | 'cat_breed' | 'cat_age' | 'cat_gender' | 'analysis_confirm'

function onInput() {
  var v = document.getElementById('in-text').value.trim();
  document.getElementById('send-btn').classList.toggle('show', v.length > 0 || pendingFiles.length > 0);
}
function onKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }

function onFiles(e) {
  Array.from(e.target.files).forEach(function(f) {
    pendingFiles.push(f);
    var chip = document.createElement('div');
    chip.className = 'uc';
    var icon = f.type.startsWith('video') ? '🎬' : f.type.startsWith('audio') ? '🔊' : '🖼';
    var name = f.name.length > 18 ? f.name.slice(0,18)+'…' : f.name;
    chip.innerHTML = icon+' '+name+' <span style="margin-left:4px;opacity:.4">✕</span>';
    chip.onclick = function() { pendingFiles = pendingFiles.filter(function(x){return x!==f;}); chip.remove(); onInput(); };
    document.getElementById('up-chips').appendChild(chip);
  });
  onInput();
  e.target.value = '';
}

function sendMsg() {
  var inp = document.getElementById('in-text');
  var text = inp.value.trim();
  if (!text && pendingFiles.length === 0) return;

  // show uploaded files
  if (pendingFiles.length > 0) {
    pendingFiles.forEach(function(f) {
      var g = document.createElement('div');
      g.className = 'mg u';
      var thumb = document.createElement('div');
      if (f.type.startsWith('image')) {
        thumb.className = 'media-thumb';
        var img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        thumb.appendChild(img);
      } else {
        thumb.className = 'media-file';
        var icon = f.type.startsWith('video') ? '🎬' : '🔊';
        thumb.innerHTML = icon+' <span>'+f.name+'</span>';
      }
      g.appendChild(thumb);
      document.getElementById('ch-msgs').appendChild(g);
    });
    var hasMedia = pendingFiles.length > 0;
    pendingFiles = [];
    document.getElementById('up-chips').innerHTML = '';

    if (!text) {
      inp.value = ''; onInput();
      scrollChat();
      // AI reacts to media upload
      showTyping(function() { aiAfterMedia(hasMedia); });
      return;
    }
  }

  // show user text bubble
  if (text) addBubble(text, 'u');
  inp.value = ''; onInput();
  scrollChat();

  // handle conversation flow
  if (awaitingAnswer) {
    handleFlowAnswer(text);
  } else {
    showTyping(function() { aiReply(text); });
  }
}

function aiAfterMedia(hasMedia) {
  // After user uploads photo/video, AI shows analysis then asks for cat info
  addBubble(
    '<div class="bb-sec">🔍 正在分析...</div>'+
    '<p style="font-size:13px;color:var(--t2)">我看到你的貓咪了。讓我先分析一下牠的行為模式。</p>', 'ai'
  );
  showTyping(function() { showAnalysisResult(); }, 2000);
}

function showAnalysisResult() {
  addBubble(
    '<div class="bb-sec">📊 分析結果</div>'+
    '<div class="bb-metrics">'+
      '<div class="bb-m"><div class="bb-mv" style="color:var(--gr)">68%</div><div class="bb-ml">快樂指數</div></div>'+
      '<div class="bb-mv-wrap bb-m"><div class="bb-mv" style="color:var(--ye)">35</div><div class="bb-ml">壓力指數</div></div>'+
      '<div class="bb-m"><div class="bb-mv" style="color:var(--ac)">78%</div><div class="bb-ml">活躍度</div></div>'+
      '<div class="bb-m"><div class="rp rm">中低風險</div><div class="bb-ml" style="margin-top:5px">風險等級</div></div>'+
    '</div>'+
    '<div class="bb-bars">'+
      '<div class="bb-br"><div class="bb-bl">快樂</div><div class="bb-bt"><div class="bb-bf" style="width:68%;background:var(--gr)"></div></div><div class="bb-bp">68%</div></div>'+
      '<div class="bb-br"><div class="bb-bl">好奇</div><div class="bb-bt"><div class="bb-bf" style="width:52%;background:var(--bl)"></div></div><div class="bb-bp">52%</div></div>'+
      '<div class="bb-br"><div class="bb-bl">焦慮</div><div class="bb-bt"><div class="bb-bf" style="width:22%;background:var(--ye)"></div></div><div class="bb-bp">22%</div></div>'+
    '</div>', 'ai'
  );
  showTyping(function() { askCatName(); }, 1200);
}

function askCatName() {
  state.flowData = {};
  awaitingAnswer = 'cat_name';
  addBubble(
    '分析完成了 🐾<br><br>為了幫牠建立完整的健康檔案，可以告訴我牠叫什麼名字嗎？', 'ai'
  );
}

function handleFlowAnswer(text) {
  if (awaitingAnswer === 'cat_name') {
    state.flowData.name = text;
    awaitingAnswer = 'cat_breed';
    showTyping(function() {
      addBubble(text+'，好可愛的名字！🐱<br><br>牠是什麼品種呢？（不確定可以說「不確定」）', 'ai');
    });
  }
  else if (awaitingAnswer === 'cat_breed') {
    state.flowData.breed = text;
    awaitingAnswer = 'cat_age';
    showTyping(function() {
      addBubble('了解～ 那'+state.flowData.name+'幾歲了呢？', 'ai');
    });
  }
  else if (awaitingAnswer === 'cat_age') {
    state.flowData.age = text;
    awaitingAnswer = 'cat_gender';
    showTyping(function() {
      var g = document.createElement('div');
      g.className = 'mg ai';
      var b = document.createElement('div');
      b.className = 'bb ai';
      b.innerHTML = '性別是？';
      var qr = document.createElement('div');
      qr.className = 'qr-row';
      ['公（已結紮）','公（未結紮）','母（已結紮）','母（未結紮）'].forEach(function(opt) {
        var btn = document.createElement('button');
        btn.className = 'qr';
        btn.textContent = opt;
        btn.onclick = function() { addBubble(opt,'u'); handleFlowAnswer(opt); };
        qr.appendChild(btn);
      });
      b.appendChild(qr);
      g.appendChild(b);
      document.getElementById('ch-msgs').appendChild(g);
      scrollChat();
    });
  }
  else if (awaitingAnswer === 'cat_gender') {
    state.flowData.gender = text;
    awaitingAnswer = null;
    // save cat
    var cat = {
      id: Date.now(),
      name: state.flowData.name,
      breed: state.flowData.breed,
      age: state.flowData.age,
      gender: state.flowData.gender,
      emoji: '🐱'
    };
    state.cats.push(cat);
    // save record
    var rec = {
      id: Date.now()+1,
      catId: cat.id,
      date: new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
      stress: 35,
      emotion: '中低風險',
      risk: 'mid',
      summary: '觀察到輕微焦慮跡象，整體活躍度良好',
      tags:['焦慮偵測','活躍正常','建議追蹤']
    };
    state.records.push(rec);
    showTyping(function() { showProfileCreated(cat); }, 800);
  }
}

function showProfileCreated(cat) {
  addBubble(
    '好了！我幫 <strong>'+cat.name+'</strong> 建立了專屬檔案 🐾<br><br>'+
    '<div style="background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-top:8px;font-size:13px;">'+
      '<div style="font-family:\'DM Serif Display\',serif;font-size:17px;font-style:italic;margin-bottom:8px;">'+cat.name+'</div>'+
      '<div style="color:var(--t2);display:flex;flex-direction:column;gap:5px;">'+
        '<span>品種：'+cat.breed+'</span>'+
        '<span>年齡：'+cat.age+'</span>'+
        '<span>性別：'+cat.gender+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="bb-action">'+
      '<button class="bb-btn-acc" onclick="navTo(\'scats\',\'nav-cats\')">查看檔案</button>'+
      '<button class="bb-btn-sec" onclick="navTo(\'srec\',\'nav-rec\')">查看報告</button>'+
    '</div>', 'ai'
  );
}

function aiReply(text) {
  var t = text.toLowerCase();
  if (t.includes('方案')||t.includes('價格')||t.includes('費用')||t.includes('多少錢')) {
    addBubble(
      '<div class="bb-sec">💳 訂閱方案</div>'+
      '<div style="display:flex;flex-direction:column;gap:8px;">'+
        '<div style="padding:12px;background:var(--s2);border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px"><div style="width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0"></div><div style="flex:1"><strong>免費版</strong><div style="color:var(--t2);font-size:11px;margin-top:2px">每日 1 次分析 · 基本報告</div></div><div style="font-family:\'DM Serif Display\',serif;color:var(--ac)">$0</div></div>'+
        '<div style="padding:12px;background:var(--acs);border:1px solid rgba(124,106,240,.3);border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px"><div style="width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0"></div><div style="flex:1"><strong>專業版</strong><div style="color:var(--t2);font-size:11px;margin-top:2px">無限次 · 趨勢圖 · PDF 匯出</div></div><div style="font-family:\'DM Serif Display\',serif;color:var(--ac)">$299</div></div>'+
        '<div style="padding:12px;background:var(--s2);border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px"><div style="width:8px;height:8px;border-radius:50%;background:#c084fc;flex-shrink:0"></div><div style="flex:1"><strong>家庭版</strong><div style="color:var(--t2);font-size:11px;margin-top:2px">多貓管理 · 年度健康摘要</div></div><div style="font-family:\'DM Serif Display\',serif;color:var(--ac)">$499</div></div>'+
      '</div>', 'ai');
  } else if (t.includes('焦慮')||t.includes('壓力')||t.includes('緊張')||t.includes('情緒')) {
    addBubble(
      '貓咪焦慮有很多種表現 🐱<br><br>你觀察到哪些行為？例如：<br><br>'+
      '<div class="qr-row">'+
        '<button class="qr" onclick="addBubble(this.textContent,\'u\');sendTextReply(this.textContent)">過度舔毛</button>'+
        '<button class="qr" onclick="addBubble(this.textContent,\'u\');sendTextReply(this.textContent)">躲藏不出來</button>'+
        '<button class="qr" onclick="addBubble(this.textContent,\'u\');sendTextReply(this.textContent)">亂尿尿</button>'+
        '<button class="qr" onclick="addBubble(this.textContent,\'u\');sendTextReply(this.textContent)">夜間暴衝</button>'+
        '<button class="qr" onclick="addBubble(this.textContent,\'u\');sendTextReply(this.textContent)">不吃東西</button>'+
      '</div>', 'ai');
  } else if (t.includes('如何')||t.includes('怎麼')||t.includes('使用')||t.includes('開始')) {
    addBubble(
      '很簡單 🐾<br><br>'+
      '<ul class="bb-list">'+
        '<li>點左下角 <strong>＋</strong> 上傳你貓咪的照片或影片</li>'+
        '<li>或者直接用文字描述你觀察到的行為</li>'+
        '<li>我會分析完後問你牠的名字，自動建立檔案</li>'+
      '</ul>', 'ai');
  } else {
    // treat as behavior description, start analysis
    addBubble(
      '了解，我來分析一下「'+text.slice(0,20)+(text.length>20?'...':'')+'」這個行為。', 'ai'
    );
    showTyping(function() { showAnalysisResult(); }, 1500);
  }
}

function sendTextReply(text) {
  showTyping(function() {
    addBubble('這是常見的焦慮跡象。你可以直接把牠的影片或照片傳給我，我來做更準確的分析 🔍', 'ai');
  });
}

function startNewCat() {
  goTo('sch');
  setTimeout(function() {
    addBubble('好，我們來新增一隻貓咪的檔案 🐾<br><br>先把牠的照片或影片傳給我吧！', 'ai');
  }, 300);
}

// ── HELPERS ──
function addBubble(html, side) {
  var g = document.createElement('div');
  g.className = 'mg ' + side;
  var b = document.createElement('div');
  b.className = 'bb ' + side;
  b.innerHTML = html;
  g.appendChild(b);
  document.getElementById('ch-msgs').appendChild(g);
  scrollChat();
}
function showTyping(cb, delay) {
  delay = delay || 800;
  var g = document.createElement('div');
  g.className = 'mg ai';
  g.id = 'typing-ind';
  var b = document.createElement('div');
  b.className = 'ty-wrap';
  b.innerHTML = '<div class="ty-d"></div><div class="ty-d"></div><div class="ty-d"></div>';
  g.appendChild(b);
  document.getElementById('ch-msgs').appendChild(g);
  scrollChat();
  setTimeout(function() {
    var el = document.getElementById('typing-ind');
    if (el) el.remove();
    cb();
    scrollChat();
  }, delay);
}
function scrollChat() {
  var m = document.getElementById('ch-msgs');
  if (m) m.scrollTop = m.scrollHeight;
}

// ── RECORDS ──
function renderRecords() {
  var el = document.getElementById('rec-list');
  if (state.records.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">還沒有分析紀錄</div><div class="empty-desc">傳一段貓咪影片或描述行為，就能開始建立紀錄。</div></div>';
    return;
  }
  el.innerHTML = '';
  state.records.slice().reverse().forEach(function(r) {
    var cat = state.cats.find(function(c){return c.id===r.catId;}) || {name:'未知',emoji:'🐱'};
    var stressColor = r.stress >= 60 ? 'var(--re)' : r.stress >= 35 ? 'var(--ye)' : 'var(--gr)';
    var item = document.createElement('div');
    item.className = 'rec-item';
    item.innerHTML =
      '<div class="rec-top">'+
        '<div class="rec-cat-av">'+cat.emoji+'</div>'+
        '<div><div class="rec-cat-name">'+cat.name+'</div><div class="rec-date">'+r.date+'</div></div>'+
        '<div class="rec-stress" style="color:'+stressColor+'">'+r.stress+'</div>'+
      '</div>'+
      '<div class="rec-summary">'+r.summary+'</div>'+
      '<div class="rec-tags">'+r.tags.map(function(t){return'<span class="rec-tag">'+t+'</span>';}).join('')+'</div>';
    el.appendChild(item);
  });
}

// ── CATS ──
function renderCats() {
  var el = document.getElementById('cat-list');
  if (state.cats.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🐱</div><div class="empty-title">還沒有貓咪檔案</div><div class="empty-desc">傳一段貓咪影片給 AI，分析完成後牠會問你名字，自動建立檔案。</div></div>';
    return;
  }
  el.innerHTML = '';
  state.cats.forEach(function(cat) {
    var catRecs = state.records.filter(function(r){return r.catId===cat.id;});
    var lastRec = catRecs[catRecs.length-1];
    var card = document.createElement('div');
    card.className = 'cat-card';
    var metricsHTML = lastRec ?
      '<div class="cat-card-metrics">'+
        '<div class="cat-mini-m"><div class="cat-mini-v" style="color:var(--gr)">68%</div><div class="cat-mini-l">快樂</div></div>'+
        '<div class="cat-mini-m"><div class="cat-mini-v" style="color:var(--ye)">'+lastRec.stress+'</div><div class="cat-mini-l">壓力</div></div>'+
        '<div class="cat-mini-m"><div class="cat-mini-v" style="color:var(--ac)">78%</div><div class="cat-mini-l">活躍</div></div>'+
      '</div>' : '<div style="font-size:12px;color:var(--mu);margin-top:10px">還沒有分析資料</div>';
    card.innerHTML =
      '<div class="cat-card-top">'+
        '<div class="cat-av-lg">'+cat.emoji+'</div>'+
        '<div class="cat-card-info">'+
          '<div class="cat-card-name">'+cat.name+'</div>'+
          '<div class="cat-card-meta">'+cat.breed+' · '+cat.age+' · '+cat.gender+'</div>'+
        '</div>'+
      '</div>'+metricsHTML;
    el.appendChild(card);
  });
}

window.addEventListener('load', function() { scrollChat(); });
</script>
