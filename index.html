<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PawSense AI</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="PawSense AI — 用 AI 讀懂你的貓咪行為、情緒與健康狀態。">
<meta property="og:title" content="PawSense AI">
<meta property="og:description" content="用 AI 讀懂你的貓咪行為、情緒與健康狀態。">
<meta property="og:type" content="website">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;--s4:#2c2c2c;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.04);
  --t:#ececec;--t2:#8a8a8a;--t3:#4a4a4a;--mu:#2a2a2a;
  --ac:#5b8ff9;--acs:rgba(91,143,249,.12);--acb:#3d6fe0;
  --gr:#3ecf8e;--ye:#f5a623;--re:#f26d6d;--pu:#9b8fef;
}
html,body{height:100%;background:#000;color:var(--t);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:430px;height:100vh;height:100svh;margin:0 auto;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ── SIDEBAR ── */
.sidebar{position:absolute;top:0;left:0;bottom:0;width:272px;background:var(–s1);border-right:1px solid var(–bd);z-index:100;transform:translateX(-100%);transition:transform .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:99;opacity:0;pointer-events:none;transition:opacity .28s}
.sb-overlay.show{opacity:1;pointer-events:all}
.sb-top{padding:54px 14px 10px;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:8px;padding:0 4px;margin-bottom:14px}
.sb-logo-ic{width:30px;height:30px;background:linear-gradient(135deg,var(–ac),var(–pu));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sb-logo-tx{font-family:‘Instrument Serif’,serif;font-size:17px;font-style:italic}
.sb-logo-tx em{color:var(–ac);font-style:normal}
.sb-new{width:100%;display:flex;align-items:center;gap:9px;background:transparent;border:1px solid var(–bd);border-radius:9px;padding:9px 12px;color:var(–t2);font-family:‘DM Sans’,sans-serif;font-size:13px;cursor:pointer;transition:all .18s;text-align:left;user-select:none}
.sb-new:hover{background:var(–s2);color:var(–t);border-color:rgba(255,255,255,.13)}
.sb-sec{padding:14px 16px 5px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(–t3)}
.sb-list{flex:1;overflow-y:auto;padding:0 6px}
.sb-list::-webkit-scrollbar{display:none}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .14s;font-size:13px;color:var(–t2);user-select:none}
.sb-item:hover{background:var(–s2);color:var(–t)}
.sb-item.act{background:var(–s3);color:var(–t)}
.sb-item-ic{font-size:14px;flex-shrink:0}
.sb-item-tx{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-del{opacity:0;font-size:15px;padding:2px 5px;background:none;border:none;color:var(–t3);cursor:pointer;flex-shrink:0;transition:opacity .14s;line-height:1}
.sb-item:hover .sb-item-del{opacity:1}
.sb-bottom{padding:10px 6px;border-top:1px solid var(–bd);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .14s}
.sb-user:hover{background:var(–s2)}
.sb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(–ac),var(–pu));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-logout{font-size:12px;color:var(–t3);background:none;border:none;cursor:pointer;padding:4px;font-family:‘DM Sans’,sans-serif;transition:color .18s;flex-shrink:0}
.sb-logout:hover{color:var(–re)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.chat-hd{flex-shrink:0;height:50px;display:flex;align-items:center;padding:0 14px;gap:10px;border-bottom:1px solid var(–bd2);background:rgba(10,10,10,.92);backdrop-filter:blur(14px);position:relative;z-index:10}
.menu-btn{width:34px;height:34px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:background .14s;flex-shrink:0}
.menu-btn:hover{background:var(–s2)}
.menu-ic{display:flex;flex-direction:column;gap:4px;pointer-events:none}
.menu-ic span{display:block;width:17px;height:1.5px;background:var(–t2);border-radius:1px}
.hd-title{flex:1;font-size:13px;font-weight:500;color:var(–t2);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mode-chip{background:var(–s2);border:1px solid var(–bd);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:500;color:var(–t2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;flex-shrink:0;user-select:none}
.mode-chip:hover{background:var(–s3);color:var(–t)}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 12px;min-height:0;height:0}
.msgs::-webkit-scrollbar{width:2px}
.msgs::-webkit-scrollbar-thumb{background:var(–s3);border-radius:2px}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 32px;text-align:center}
.wl-logo{width:52px;height:52px;background:linear-gradient(135deg,var(–ac),var(–pu));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px;box-shadow:0 6px 28px rgba(91,143,249,.28)}
.wl-title{font-family:‘Instrument Serif’,serif;font-size:24px;font-style:italic;margin-bottom:7px}
.wl-title em{color:var(–ac);font-style:normal}
.wl-sub{font-size:13px;color:var(–t2);line-height:1.6;max-width:260px;margin-bottom:24px}
.sg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:310px}
.sg-card{background:var(–s1);border:1px solid var(–bd);border-radius:12px;padding:13px 12px;cursor:pointer;transition:all .18s;text-align:left;user-select:none}
.sg-card:hover{background:var(–s2);border-color:rgba(91,143,249,.22);transform:translateY(-1px)}
.sg-card:active{transform:scale(.97)}
.sg-ic{font-size:18px;margin-bottom:6px}
.sg-t{font-size:12px;font-weight:600;margin-bottom:2px}
.sg-d{font-size:11px;color:var(–t2);line-height:1.4}

/* Bubbles */
.mg{padding:16px 14px 0;display:flex}
.mg.user{justify-content:flex-end}
.mg.ai{align-items:flex-start;gap:9px}
.ai-av{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(–ac),var(–pu));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:3px}
.bb{font-size:14px;line-height:1.72;animation:bup .22s ease both}
@keyframes bup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.bb.user{max-width:80%;padding:11px 15px;background:var(–s2);border:1px solid var(–bd);border-radius:17px 17px 4px 17px;color:var(–t)}
.bb.ai{max-width:calc(100% - 35px);color:var(–t);padding:2px 0 0}
.bb.ai p{margin-bottom:9px;color:var(–t2)}
.bb.ai p:last-child{margin-bottom:0}
.bb.ai h3{font-family:‘Instrument Serif’,serif;font-size:16px;font-style:italic;margin-bottom:7px;color:var(–t)}
.bb.ai strong{color:var(–t);font-weight:600}
.bb.ai ul{list-style:none;margin:5px 0;display:flex;flex-direction:column;gap:4px}
.bb.ai ul li{padding-left:13px;position:relative;font-size:13px;line-height:1.65;color:var(–t2)}
.bb.ai ul li::before{content:’·’;position:absolute;left:0;color:var(–ac);font-weight:800;font-size:16px;line-height:1.2}
.qr-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.qr{background:transparent;border:1px solid var(–bd);border-radius:18px;padding:6px 12px;font-size:12px;color:var(–t2);cursor:pointer;transition:all .18s;font-family:‘DM Sans’,sans-serif;user-select:none}
.qr:hover{border-color:var(–ac);color:var(–ac);background:var(–acs)}
.qr:active{transform:scale(.95)}

/* Result card */
.res-card{background:var(–s1);border:1px solid var(–bd);border-radius:14px;padding:15px;margin-top:6px;max-width:min(82%,320px)}
.res-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.res-cat{font-size:11px;color:var(–t2)}
.res-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.sb-wrap{margin-bottom:11px}
.sb-label{display:flex;justify-content:space-between;font-size:11px;color:var(–t2);margin-bottom:4px}
.sb-track{height:5px;background:var(–s3);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.16,1,.3,1)}
.res-txt{font-size:12px;color:var(–t2);line-height:1.72;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}
.res-txt::-webkit-scrollbar{width:2px}
.res-txt::-webkit-scrollbar-thumb{background:var(–s3)}
.rat-row{display:flex;align-items:center;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(–bd2)}
.rat-lbl{font-size:11px;color:var(–t3);flex:1}
.stars{display:flex;gap:2px}
.star{font-size:17px;cursor:pointer;opacity:.22;color:var(–ye);transition:all .14s;user-select:none}
.star.on{opacity:1}
.star:hover{transform:scale(1.18);opacity:.7}

/* Typing */
.ty-wrap{padding:16px 14px 0;display:flex;align-items:flex-start;gap:9px}
.ty-dots{display:inline-flex;gap:4px;padding:10px 13px;background:var(–s1);border:1px solid var(–bd);border-radius:4px 13px 13px 13px}
.ty-d{width:5px;height:5px;border-radius:50%;background:var(–t3);animation:td 1.2s ease infinite}
.ty-d:nth-child(2){animation-delay:.16s}.ty-d:nth-child(3){animation-delay:.32s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── INPUT ── */
.inp-area{flex-shrink:0;padding:8px 12px 26px;background:var(–bg)}
.inp-wrap{display:flex;align-items:flex-end;gap:7px;background:var(–s1);border:1px solid var(–bd);border-radius:15px;padding:7px 7px 7px 15px;transition:border-color .2s}
.inp-wrap:focus-within{border-color:rgba(91,143,249,.32)}
.inp-tx{flex:1;background:none;border:none;outline:none;color:var(–t);font-family:‘DM Sans’,sans-serif;font-size:15px;line-height:1.5;resize:none;max-height:110px;min-height:24px;caret-color:var(–ac);padding:2px 0}
.inp-tx::placeholder{color:var(–t3)}
.send-btn{width:32px;height:32px;border-radius:8px;border:none;background:var(–ac);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:all .18s;opacity:.35;pointer-events:none;flex-shrink:0;user-select:none}
.send-btn.on{opacity:1;pointer-events:all;transition:transform .1s}.send-btn.on:active{transform:scale(.92)}
.send-btn:hover{background:var(–acb)}
.send-btn:active{transform:scale(.9)}
.inp-hint{font-size:10px;color:var(–t3);text-align:center;margin-top:6px}

/* ── CAT SELECTOR BAR ── */
.cat-bar{display:none;align-items:center;gap:8px;padding:8px 12px 0;overflow-x:auto;flex-shrink:0}
.cat-bar::-webkit-scrollbar{display:none}
.cat-bar.show{display:flex}
.cat-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(–s1);border:1px solid var(–bd);border-radius:20px;cursor:pointer;transition:all .18s;font-size:12px;font-weight:500;color:var(–t2);white-space:nowrap;user-select:none;flex-shrink:0}
.cat-chip:hover{border-color:var(–ac);color:var(–t)}
.cat-chip.sel{background:var(–acs);border-color:var(–ac);color:var(–ac)}
.cat-chip-av{font-size:15px}

/* ── MODE SHEET ── */
.sh-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:149;opacity:0;pointer-events:none;transition:opacity .25s}
.sh-overlay.show{opacity:1;pointer-events:all}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(–s1);border-top:1px solid var(–bd);border-radius:18px 18px 0 0;z-index:150;transform:translateY(100%);transition:transform .28s cubic-bezier(.16,1,.3,1);padding-bottom:28px}
.sheet.open{transform:translateY(0)}
.sh-handle{width:32px;height:3px;background:var(–s4);border-radius:2px;margin:11px auto 14px}
.sh-title{font-size:12px;font-weight:600;color:var(–t3);padding:0 18px 11px;border-bottom:1px solid var(–bd2);letter-spacing:.5px;text-transform:uppercase}
.sh-item{display:flex;align-items:center;gap:13px;padding:15px 18px;cursor:pointer;transition:background .14s;user-select:none}
.sh-item:hover{background:var(–s2)}
.sh-item:active{background:var(–s3)}
.sh-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.sh-body{}
.sh-nm{font-size:14px;font-weight:600;margin-bottom:2px}
.sh-ds{font-size:12px;color:var(–t2)}
.sh-item.act .sh-nm{color:var(–ac)}

/* ── RESPONSIVE & ACCESSIBILITY ── */
img{max-width:100%;height:auto;display:block;}
*:focus-visible{outline:2px solid var(–ac);outline-offset:2px;}

/* ── TYPOGRAPHY SCALE ── */
.bb.ai h3{font-size:15px;font-weight:600;margin:10px 0 4px;color:var(–t)}
.bb.ai p{font-size:14px;line-height:1.65;margin:3px 0;color:var(–t)}
.bb.ai ul{padding-left:16px;margin:4px 0}
.bb.ai li{font-size:14px;line-height:1.65;color:var(–t);margin:2px 0}
.bb.ai strong{color:var(–t);font-weight:600}
</style>

</head>
<body>
<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">
      <div class="sb-logo-ic">🐾</div>
      <div class="sb-logo-tx">Paw<em>Sense</em></div>
    </div>
    <button class="sb-new" onclick="newChat()" aria-label="開始新對話">
      <span style="font-size:15px">✏️</span> 新對話
    </button>
  </div>
  <div class="sb-sec">對話紀錄</div>
  <div class="sb-list" id="sb-list"></div>
  <div class="sb-bottom">
    <div class="sb-user">
      <div class="sb-av">🐾</div>
      <div class="sb-uname">PawSense AI</div>
      <button class="sb-logout" onclick="clearData()">清除資料</button>
    </div>
  </div>
</div>
<div class="sb-overlay" id="sb-ov" onclick="closeSB()"></div>

<!-- MAIN -->

<div class="main">
  <div class="chat-hd">
    <button class="menu-btn" onclick="toggleSB()">
      <div class="menu-ic"><span></span><span></span><span></span></div>
    </button>
    <div class="hd-title" id="hd-title">PawSense AI</div>
    <div class="mode-chip" id="mode-chip" onclick="openSheet()" role="button" aria-label="切換模式" tabindex="0">🐱 問答</div>
  </div>
  <div class="cat-bar" id="cat-bar"></div>
  <div class="msgs" id="msgs"></div>
  <div class="inp-area">
    <div class="inp-wrap">
      <textarea class="inp-tx" id="inp-tx" placeholder="輸入訊息..." rows="1"
        oninput="onInp()" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()" aria-label="傳送訊息">↑</button>
    </div>
    <div class="inp-hint">PawSense AI · 分析結果僅供參考</div>
  </div>
</div>

<!-- MODE SHEET -->

<div class="sh-overlay" id="sh-ov" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-title">選擇模式</div>
  <div class="sh-item act" id="sm-general" onclick="setMode('general')">
    <div class="sh-ic" style="background:rgba(91,143,249,.1)">🐱</div>
    <div class="sh-body"><div class="sh-nm">貓咪問答</div><div class="sh-ds">問任何關於貓咪的問題</div></div>
  </div>
  <div class="sh-item" id="sm-analyze" onclick="setMode('analyze')">
    <div class="sh-ic" style="background:rgba(62,207,142,.1)">🔍</div>
    <div class="sh-body"><div class="sh-nm">行為分析</div><div class="sh-ds">AI 搜尋獸醫文獻，評估壓力與風險</div></div>
  </div>
  <div class="sh-item" id="sm-report" onclick="setMode('report')">
    <div class="sh-ic" style="background:rgba(155,143,239,.1)">📋</div>
    <div class="sh-body"><div class="sh-nm">報告解讀</div><div class="sh-ds">解讀過往的分析報告</div></div>
  </div>
  <div class="sh-item" id="sm-cat" onclick="setMode('cat')">
    <div class="sh-ic" style="background:rgba(245,166,35,.1)">🐈</div>
    <div class="sh-body"><div class="sh-nm">貓咪管理</div><div class="sh-ds">新增 / 查看貓咪資料</div></div>
  </div>
</div>
<script>
// ══ STORAGE ══
var DB_KEY='pawsense_v5';
function loadDB(){try{var r=localStorage.getItem(DB_KEY);return r?JSON.parse(r):{users:[],cur:null};}catch(e){return{users:[],cur:null};}}
function saveDB(){try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}}
var DB=loadDB();
function curU(){
  if(!DB.cur)return null;
  var u=DB.users.find(function(u){return u.email===DB.cur;})||null;
  if(!u)return null;
  if(!u.cats)u.cats=[];if(!u.records)u.records=[];if(!u.sessions)u.sessions=[];if(!u.favs)u.favs=[];
  return u;
}
function clearData(){
  if(!confirm('確定要清除所有資料嗎？'))return;
  localStorage.removeItem(DB_KEY);
  DB={users:[{name:'我',email:'local',pw:'',cats:[],records:[],sessions:[],favs:[]}],cur:'local'};
  saveDB();curSessId=null;sessMsgs=[];chatHist=[];selCatId=null;catAddStep=null;catTemp={};
  closeSB();renderSB();renderMsgs([]);refreshCatBar();
}
// ══ SIDEBAR / SHEET ══
function toggleSB(){var s=document.getElementById('sidebar'),o=document.getElementById('sb-ov');var op=s.classList.toggle('open');o.classList.toggle('show',op);}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('show');}
function openSheet(){document.getElementById('sheet').classList.add('open');document.getElementById('sh-ov').classList.add('show');}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sh-ov').classList.remove('show');}
function renderSB(){
  var u=curU();if(!u)return;
  var list=document.getElementById('sb-list');list.innerHTML='';
  if(!u.sessions||!u.sessions.length){
    var empty=document.createElement('div');
    empty.style.cssText='padding:10px 12px;font-size:12px;color:var(--t3)';
    empty.textContent='還沒有對話紀錄';
    list.appendChild(empty);return;
  }
  u.sessions.slice().reverse().forEach(function(s){
    var el=document.createElement('div');
    el.className='sb-item'+(s.id===curSessId?' act':'');
    var ic={general:'🐱',analyze:'🔍',report:'📋',cat:'🐈'}[s.mode]||'🐱';
    var icS=document.createElement('span');icS.className='sb-item-ic';icS.textContent=ic;
    var txS=document.createElement('span');txS.className='sb-item-tx';txS.textContent=s.title||'新對話';
    var del=document.createElement('button');del.className='sb-item-del';del.textContent='×';
    del.onclick=function(e){e.stopPropagation();delSess(s.id);};
    el.appendChild(icS);el.appendChild(txS);el.appendChild(del);
    el.onclick=function(e){if(e.target===del)return;loadSess(s.id);closeSB();};
    list.appendChild(el);
  });
}
function delSess(id){var u=curU();if(!u)return;u.sessions=u.sessions.filter(function(s){return s.id!==id;});saveDB();if(curSessId===id)newChat();else renderSB();}
// ══ SESSIONS ══
var curSessId=null,sessMsgs=[];
function newChat(){
  curSessId=null;chatHist=[];sessMsgs=[];catAddStep=null;catTemp={};
  document.getElementById('hd-title').textContent='PawSense AI';
  renderMsgs([]);renderSB();closeSB();
}
function loadSess(id){
  var u=curU();if(!u)return;
  var s=u.sessions.find(function(s){return s.id===id;});if(!s)return;
  curSessId=id;sessMsgs=s.messages||[];chatHist=s.history||[];
  setModeSilent(s.mode||'general');
  document.getElementById('hd-title').textContent=s.title||'對話';
  renderMsgs(sessMsgs);
}
function saveSess(title){
  var u=curU();if(!u)return;
  if(!u.sessions)u.sessions=[];
  if(curSessId){
    var s=u.sessions.find(function(s){return s.id===curSessId;});
    if(s){s.messages=sessMsgs;s.history=chatHist;if(title)s.title=title;saveDB();renderSB();return;}
  }
  var id='s'+Date.now();curSessId=id;
  u.sessions.push({id:id,title:title||'新對話',mode:chatMode,messages:sessMsgs,history:chatHist});
  saveDB();renderSB();
  if(title)document.getElementById('hd-title').textContent=title;
}
// ══ RENDER MESSAGES ══
function renderMsgs(msgs){
  sessMsgs=msgs;
  var el=document.getElementById('msgs');el.innerHTML='';
  if(!msgs||!msgs.length){el.appendChild(buildWelcome());return;}
  msgs.forEach(function(m){appendMsgEl(m,false);});
  scrollBot();
}
function buildWelcome(){
  var div=document.createElement('div');div.className='welcome';
  var logo=document.createElement('div');logo.className='wl-logo';logo.textContent='🐾';
  var title=document.createElement('div');title.className='wl-title';title.innerHTML='Paw<em>Sense</em> AI';
  var sub=document.createElement('div');sub.className='wl-sub';sub.textContent='有什麼關於貓咪的問題嗎？';
  var grid=document.createElement('div');grid.className='sg-grid';
  var suggests=[
    {ic:'🔍',t:'行為分析',d:'描述行為，搜尋並分析',q:'我想分析貓咪的行為'},
    {ic:'🐈',t:'新增貓咪',d:'建立貓咪資料',q:'幫我新增一隻貓咪'},
    {ic:'💊',t:'健康問題',d:'搜尋症狀與建議',q:'我的貓咪最近食慾不振'},
    {ic:'📊',t:'查看紀錄',d:'查看過往分析',q:'幫我看最近的分析結果'}
  ];
  suggests.forEach(function(s){
    var card=document.createElement('div');card.className='sg-card';
    var ic=document.createElement('div');ic.className='sg-ic';ic.textContent=s.ic;
    var t=document.createElement('div');t.className='sg-t';t.textContent=s.t;
    var d=document.createElement('div');d.className='sg-d';d.textContent=s.d;
    card.appendChild(ic);card.appendChild(t);card.appendChild(d);
    card.onclick=(function(q){return function(){tapQ(q);};})(s.q);
    grid.appendChild(card);
  });
  div.appendChild(logo);div.appendChild(title);div.appendChild(sub);div.appendChild(grid);
  return div;
}
function appendMsgEl(m,anim){
  var el=document.getElementById('msgs');
  var w=el.querySelector('.welcome');if(w)w.remove();
  if(m.role==='user'){
    var g=document.createElement('div');g.className='mg user';
    var b=document.createElement('div');b.className='bb user';
    if(!anim)b.style.animation='none';
    b.textContent=m.content;g.appendChild(b);el.appendChild(g);
  } else {
    var g=document.createElement('div');g.className='mg ai';
    var av=document.createElement('div');av.className='ai-av';av.textContent='🐾';
    var b=document.createElement('div');b.className='bb ai';
    if(!anim)b.style.animation='none';
    if(m.type==='result'&&m.rd){b.appendChild(buildResCard(m.rd));}
    else{
      b.innerHTML=fmtAI(m.content);
      if(m.qr&&m.qr.length){
        var qrRow=document.createElement('div');qrRow.className='qr-row';
        m.qr.forEach(function(q){
          var btn=document.createElement('button');btn.className='qr';btn.textContent=q;
          btn.onclick=(function(qq){return function(){tapQ(qq);};})(q);
          qrRow.appendChild(btn);
        });
        b.appendChild(qrRow);
      }
    }
    g.appendChild(av);g.appendChild(b);el.appendChild(g);
  }
  if(anim)scrollBot();
}
function buildResCard(r){
  var sc=r.sl>=60?'var(--re)':r.sl>=35?'var(--ye)':'var(--gr)';
  var rl=r.risk==='高'?'高風險':r.risk==='低'?'低風險':'中風險';
  var rc=r.risk==='高'?'rgba(242,109,109,.13)':r.risk==='低'?'rgba(62,207,142,.13)':'rgba(245,166,35,.13)';
  var rt=r.risk==='高'?'var(--re)':r.risk==='低'?'var(--gr)':'var(--ye)';
  var c=document.createElement('div');c.className='res-card';c.id='rc-'+r.id;
  var hd=document.createElement('div');hd.className='res-hd';
  var cat=document.createElement('div');cat.className='res-cat';cat.textContent=(r.catEmoji||'🐱')+' '+(r.catName||'貓咪')+'・'+r.date;
  var badge=document.createElement('div');badge.className='res-badge';badge.textContent=rl;
  badge.style.cssText='background:'+rc+';color:'+rt;
  hd.appendChild(cat);hd.appendChild(badge);
  var sbw=document.createElement('div');sbw.className='sb-wrap';
  var lbl=document.createElement('div');lbl.className='sb-label';
  lbl.innerHTML='<span>壓力指數</span><span style="color:'+sc+';font-weight:600">'+r.sl+' / 100</span>';
  var trk=document.createElement('div');trk.className='sb-track';
  var fill=document.createElement('div');fill.className='sb-fill';fill.id='sf-'+r.id;
  fill.style.cssText='width:0%;background:'+sc;
  trk.appendChild(fill);sbw.appendChild(lbl);sbw.appendChild(trk);
  var txt=document.createElement('div');txt.className='res-txt';txt.textContent=r.fullReport;
  var ratRow=document.createElement('div');ratRow.className='rat-row';
  var ratLbl=document.createElement('div');ratLbl.className='rat-lbl';ratLbl.textContent='這份分析有幫助嗎？';
  var stars=document.createElement('div');stars.className='stars';stars.id='rs-'+r.id;
  for(var i=1;i<=5;i++){
    var star=document.createElement('div');star.className='star'+(i<=(r.rating||0)?' on':'');
    star.textContent='★';
    star.onclick=(function(score,rid){return function(){rateRes(rid,score);};})(i,r.id);
    stars.appendChild(star);
  }
  ratRow.appendChild(ratLbl);ratRow.appendChild(stars);
  c.appendChild(hd);c.appendChild(sbw);c.appendChild(txt);c.appendChild(ratRow);
  setTimeout(function(){var f=document.getElementById('sf-'+r.id);if(f)f.style.width=r.sl+'%';},80);
  return c;
}
function fmtAI(text){
  if(!text)return'';
  var o=esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^[•\-] (.+)$/gm,'<li>$1</li>');
  var lines=o.split('\n');var out=[];var ul=false;
  lines.forEach(function(l){
    if(l.startsWith('<li>')){if(!ul){out.push('<ul>');ul=true;}out.push(l);}
    else{if(ul){out.push('</ul>');ul=false;}if(l.trim())out.push(l.startsWith('<h3>')?l:'<p>'+l+'</p>');}
  });
  if(ul)out.push('</ul>');
  return out.join('');
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollBot(){var m=document.getElementById('msgs');if(m)setTimeout(function(){m.scrollTop=m.scrollHeight;},40);}
function tapQ(q){document.getElementById('inp-tx').value=q;onInp();sendMsg();}

var chatMode='general';
var modeLabel={general:'🐱 問答',analyze:'🔍 分析',report:'📋 解讀',cat:'🐈 管理'};
var selCatId=null;
function setModeSilent(m){
  chatMode=m;
  document.getElementById('mode-chip').textContent=modeLabel[m]||'🐱 問答';
  ['general','analyze','report','cat'].forEach(function(k){
    var el=document.getElementById('sm-'+k);if(el)el.classList.toggle('act',k===m);
  });
  var ph={general:'有什麼想問的？',analyze:'描述貓咪的行為...',report:'問我關於分析報告...',cat:'說「新增貓咪」或「查看貓咪」...'};
  document.getElementById('inp-tx').placeholder=ph[m]||'輸入訊息...';
  refreshCatBar();
}
function setMode(m){
  setModeSilent(m);closeSheet();
  var intro={
    general:'已切換到 **貓咪問答** 模式。有什麼問題嗎？',
    analyze:'已切換到 **行為分析** 模式。描述觀察到的行為，我會搜尋獸醫文獻幫你分析。',
    report:'已切換到 **報告解讀** 模式。我可以幫你解讀過往分析報告。',
    cat:'已切換到 **貓咪管理** 模式。說「新增貓咪」或「查看我的貓咪」。'
  };
  if(sessMsgs.length){pushAI(intro[m],[]);saveSess(null);}
}
function refreshCatBar(){
  var bar=document.getElementById('cat-bar');if(!bar)return;
  var u=curU();
  if(chatMode!=='analyze'||!u||!u.cats||!u.cats.length){bar.classList.remove('show');return;}
  bar.classList.add('show');
  bar.innerHTML='';
  var lbl=document.createElement('span');
  lbl.style.cssText='font-size:11px;color:var(--t3);white-space:nowrap;flex-shrink:0;padding-top:2px';
  lbl.textContent='分析對象：';bar.appendChild(lbl);
  u.cats.forEach(function(c){
    var chip=document.createElement('div');
    chip.className='cat-chip'+(selCatId===c.id?' sel':'');
    chip.dataset.id=c.id;
    chip.textContent=c.emoji+' '+c.name;
    chip.onclick=(function(id){return function(){selCat(id);};})(c.id);
    bar.appendChild(chip);
  });
  var add=document.createElement('div');add.className='cat-chip';
  add.style.borderStyle='dashed';add.textContent='＋ 新增';
  add.onclick=function(){setModeSilent('cat');setMode('cat');};
  bar.appendChild(add);
  if(!selCatId&&u.cats.length)selCat(u.cats[0].id);
}
function selCat(id){
  selCatId=id;
  document.querySelectorAll('.cat-chip[data-id]').forEach(function(c){
    c.classList.toggle('sel',parseInt(c.dataset.id)===id);
  });
}

function onInp(){
  var t=document.getElementById('inp-tx');
  t.style.height='auto';t.style.height=Math.min(t.scrollHeight,110)+'px';
  document.getElementById('send-btn').classList.toggle('on',t.value.trim().length>0);
}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
// ══ SEND ══
var chatHist=[];
async function sendMsg(){
  var t=document.getElementById('inp-tx');var txt=t.value.trim();if(!txt)return;
  t.value='';t.style.height='auto';document.getElementById('send-btn').classList.remove('on');
  var u=curU();
  var um={role:'user',content:txt};sessMsgs.push(um);appendMsgEl(um,true);
  if(!curSessId)saveSess(txt.substring(0,22));else saveSess(null);
  var tid='ty'+Date.now();
  var tg=document.createElement('div');tg.className='ty-wrap';tg.id=tid;
  var tav=document.createElement('div');tav.className='ai-av';tav.textContent='🐾';
  var tdots=document.createElement('div');tdots.className='ty-dots';
  tdots.innerHTML='<div class="ty-d"></div><div class="ty-d"></div><div class="ty-d"></div>';
  tg.appendChild(tav);tg.appendChild(tdots);
  document.getElementById('msgs').appendChild(tg);scrollBot();
  if(chatMode==='cat'||catAddStep){removeEl(tid);await catFlow(txt,u);return;}
  var low2=txt.toLowerCase();
  if(low2.includes('新增貓咪')||low2.includes('加入貓咪')||low2.includes('新增一隻貓')){
    removeEl(tid);setModeSilent('cat');await catFlow(txt,u);return;
  }
  // 分析模式但還沒有貓咪 - 提前引導
  if(chatMode==='analyze'&&(!u||!u.cats||!u.cats.length)){
    removeEl(tid);
    pushAI('🐱 **還沒有貓咪資料！**\n\n進行行為分析前，需要先建立貓咪的基本資料，這樣分析結果才能保存在正確的檔案裡。\n\n請先告訴我貓咪的**名字**是什麼？',['幫我新增貓咪']);
    setModeSilent('cat');catAddStep=null;
    return;
  }
  var catInfo='';
  if(u&&u.cats&&u.cats.length){
    catInfo='\n\n用戶的貓咪：'+u.cats.map(function(c){return c.name+'（'+c.breed+'，'+c.age+'，'+c.gender+'）';}).join('、');
  }
  var sys='你是 PawSense AI，一個懂貓咪與各種寵物的 AI 助理朋友。\n用繁體中文回答，語氣親切自然，像好友聊天一樣。\n\n你擅長回答任何寵物問題，包含：\n- 行為解讀：早上一直叫、半夜狂奔、為什麼喜歡紙箱、為什麼踩奶\n- 情緒與溝通：尾巴/耳朵/眼神的含義\n- 日常照護：飲食、梳毛、剪指甲、如廁訓練\n- 健康問題：常見症狀判斷（並適時提醒就醫）\n- 生活環境：玩具選擇、睡眠空間、多貓相處\n\n你有網路搜尋工具可查詢最新資訊，遇到需要即時資訊的問題請主動搜尋。回答要具體有用，用 **粗體** 標示重點，必要時條列整理，結尾可補充 1 個延伸小知識。'+catInfo;
  if(chatMode==='analyze'){
    var sc2=selCatId&&u&&u.cats?u.cats.find(function(c){return c.id===selCatId;}):null;
    if(sc2)sys+='\n\n目前分析對象：'+sc2.name+'（'+sc2.breed+'，'+sc2.age+'）';
    sys+='\n\n進行行為分析時請搜尋最新獸醫文獻，回覆須包含：\n【行為解析】\n【情緒評估】\n【壓力指數】：XX/100\n【風險等級】：低/中/高\n【改善建議】\n【何時就醫】';
  }
  if(chatMode==='report'&&u&&u.records&&u.records.length){
    var lr=u.records[u.records.length-1];
    var lc=u.cats.find(function(c){return c.id===lr.catId;})||{name:'貓咪'};
    sys+='\n\n最近分析報告（'+lc.name+'，'+lr.date+'）：\n'+lr.fullReport;
  }
  chatHist.push({role:'user',content:txt});
  try{
    // 加入 web_search 工具，讓 AI 可以搜尋最新資料
    var body={
      model:'claude-sonnet-4-20250514',
      max_tokens:1500,
      system:sys,
      messages:chatHist.slice(-12),
      tools:[{type:'web_search_20250305',name:'web_search'}]
    };
    var reply='';
    // tool_use 循環 - 最多 8 次
    for(var loop=0;loop<8;loop++){
      var res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify(body)
      });
      if(!res.ok){var et=await res.text();throw new Error('HTTP '+res.status);}
      var data=await res.json();
      if(data.error)throw new Error(data.error.message||'API 錯誤');
      var allBlocks=data.content||[];
      var textBlocks=allBlocks.filter(function(b){return b.type==='text';});
      var toolBlocks=allBlocks.filter(function(b){return b.type==='tool_use';});
      // AI 想使用工具 - 回傳結果繼續
      if(data.stop_reason==='tool_use'&&toolBlocks.length){
        body.messages=body.messages.concat([{role:'assistant',content:allBlocks}]);
        var toolResults=toolBlocks.map(function(b){
          return {type:'tool_result',tool_use_id:b.id,content:[{type:'text',text:'搜尋完成，請根據你的知識回答。'}]};
        });
        body.messages=body.messages.concat([{role:'user',content:toolResults}]);
        continue;
      }
      // 取得文字回覆
      reply=textBlocks.map(function(b){return b.text;}).join('\n').trim();
      break;
    }
    if(!reply)throw new Error('AI 未返回文字');
    chatHist.push({role:'assistant',content:reply});
    removeEl(tid);
    var sm=reply.match(/壓力指數[^\d]*(\d+)/)||reply.match(/(\d+)\s*[\/／]\s*100/);
    var rm=reply.match(/風險等級[^低中高]*(低|中|高)/)||reply.match(/(低|中|高)風險/);
    if(chatMode==='analyze'&&sm&&rm&&u&&u.cats&&u.cats.length){
      var sl=Math.min(100,Math.max(0,parseInt(sm[1])));var risk=rm[1];
      var cat=(selCatId&&u.cats.find(function(c){return c.id===selCatId;}))||u.cats[0];
      var rec={id:Date.now(),catId:cat.id,catName:cat.name,catEmoji:cat.emoji||'🐱',
        date:new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
        inputText:txt,fullReport:reply,sl:sl,risk:risk,rating:0};
      u.records.push(rec);saveDB();
      var am={role:'assistant',type:'result',content:reply,rd:rec,qr:['再問一個問題','繼續分析']};
      sessMsgs.push(am);appendMsgEl(am,true);
    } else {
      pushAI(reply,[]);
    }
    saveSess(null);
  }catch(err){
    removeEl(tid);
    var errMsg=err.message||'';
    var u2=curU();
    // 分析錯誤類型，給出具體引導
    if(!u2||!u2.cats||!u2.cats.length){
      pushAI('📋 **還沒有貓咪資料！**\n\n在進行行為分析之前，需要先建立貓咪的基本資料。\n\n請告訴我：\n- **貓咪的名字**是什麼？',['幫我新增貓咪']);
    } else if(errMsg.includes('HTTP 401')||errMsg.includes('401')){
      pushAI('🔑 **API 金鑰無效**\n\n無法連接到 AI 服務，請確認 API 金鑰是否正確。',['重新嘗試']);
    } else if(errMsg.includes('HTTP 429')||errMsg.includes('429')){
      pushAI('⏳ **請求太頻繁**\n\n請稍等幾秒後再試一次。',['稍後再試']);
    } else if(errMsg.includes('HTTP 5')||errMsg.includes('500')||errMsg.includes('503')){
      pushAI('🔧 **伺服器暫時異常**\n\n服務端出現問題，請稍後再試。',['重新嘗試']);
    } else if(errMsg.includes('fetch')||errMsg.includes('network')||errMsg.includes('Failed')){
      pushAI('📡 **網路連線問題**\n\n無法連接到 AI 服務，請確認：\n- 網路是否正常？\n- 是否需要重新整理頁面？',['重新嘗試']);
    } else if(chatMode==='analyze'&&(!txt||txt.trim().length<10)){
      pushAI('📝 **描述太短了！**\n\n為了準確分析貓咪的行為，請提供更多細節：\n\n- 行為**發生的時間**？\n- 行為**持續多久**？\n- 當時**環境**是什麼樣子？\n- 最近**有什麼變化**嗎？',[]);
    } else {
      // 通用錯誤 - 引導使用者補充資訊
      pushAI('🤔 **需要更多資訊才能回答**\n\n我無法理解這個問題，可以換個方式描述嗎？\n\n例如：\n- 貓咪**具體做了什麼**？\n- **什麼時候**發生的？\n- 這個情況**持續多久**了？',['重新描述','換個問題']);
    }
    saveSess(null);
  }
}
// ══ CAT FLOW ══
var catAddStep=null,catTemp={};
async function catFlow(txt,u){
  if(!u)u=curU();
  // Handle error recovery quick replies
  if(txt==='重新嘗試'||txt==='稍後再試'){
    pushAI('好的，你可以重新輸入你的問題，我來幫你！',[]);return;
  }
  if(txt==='重新描述'||txt==='換個問題'){
    pushAI('沒問題！請重新描述你的問題，可以更具體一點，例如說明發生的時間、貓咪的行為、持續多久等。',[]);return;
  }
  var low=txt.toLowerCase();
  if(low.includes('查看')||low.includes('我的貓')||low.includes('列出')){
    if(!u.cats.length){pushAI('你還沒有新增任何貓咪。\n\n說「**新增貓咪**」來建立第一隻！',['新增貓咪']);return;}
    var listTxt=u.cats.map(function(c,i){
      return '**'+(i+1)+'. '+c.emoji+' '+c.name+'**（'+c.breed+'，'+c.age+'，'+c.gender+'）\n分析次數：'+u.records.filter(function(r){return r.catId===c.id;}).length+'次';
    }).join('\n\n');
    pushAI('你的貓咪：\n\n'+listTxt,['新增貓咪','切換到行為分析']);return;
  }
  if(low.includes('新增')||low.includes('加入')||catAddStep){await catAddFlow(txt,u);return;}
  if(low.includes('紀錄')||low.includes('報告')){
    if(!u.records.length){pushAI('還沒有分析紀錄。切換到**行為分析**模式開始吧！',['切換到行為分析']);return;}
    var recentTxt=u.records.slice(-3).reverse().map(function(r){
      var c=u.cats.find(function(x){return x.id===r.catId;})||{name:'貓咪'};
      return '📅 '+r.date+' — **'+c.name+'** 壓力 '+r.sl+'/100（'+r.risk+'風險）';
    }).join('\n\n');
    pushAI('最近'+Math.min(3,u.records.length)+'筆分析：\n\n'+recentTxt,['解讀最新報告','切換到行為分析']);return;
  }
  if(txt.includes('切換到行為分析')){setMode('analyze');return;}
  if(txt.includes('解讀最新報告')){setMode('report');return;}
  pushAI('在**貓咪管理**模式中你可以：\n\n- **查看我的貓咪**\n- **新增貓咪**\n- **查看紀錄**',['查看我的貓咪','新增貓咪','查看紀錄']);
}
async function catAddFlow(txt,u){
  if(!catAddStep){catAddStep='name';catTemp={emoji:'🐱'};pushAI('好的！貓咪的**名字**是？',[]);return;}
  if(catAddStep==='name'){catTemp.name=txt.trim();catAddStep='breed';pushAI('**品種**是什麼？（例：英短、米克斯）',[]);return;}
  if(catAddStep==='breed'){catTemp.breed=txt.trim()||'未填';catAddStep='age';pushAI('**年齡**是？（例：3歲、8個月）',[]);return;}
  if(catAddStep==='age'){catTemp.age=txt.trim()||'未填';catAddStep='gender';pushAI('**性別**？',['公（已結紮）','公（未結紮）','母（已結紮）','母（未結紮）']);return;}
  if(catAddStep==='gender'){
    catTemp.gender=txt.trim()||'未填';catAddStep='confirm';
    pushAI('確認：\n\n🐱 '+catTemp.name+' / '+catTemp.breed+' / '+catTemp.age+' / '+catTemp.gender+'\n\n**確認儲存？**',['確認','重新開始']);return;
  }
  if(catAddStep==='confirm'){
    if(txt.includes('確認')){
      catTemp.id=Date.now();catTemp.createdAt=new Date().toLocaleDateString('zh-TW');
      u.cats.push(catTemp);saveDB();
      var nm=catTemp.name;catAddStep=null;catTemp={};
      selCatId=u.cats[u.cats.length-1].id;refreshCatBar();
      pushAI('✅ **'+nm+'** 已新增！\n\n切換到**行為分析**模式可以分析牠的行為。',['切換到行為分析','查看我的貓咪']);
    }else{catAddStep=null;catTemp={};pushAI('已取消。',['新增貓咪']);}
    return;
  }
}
function pushAI(content,qr){
  chatHist.push({role:'assistant',content:content});
  var msg={role:'assistant',content:content,qr:qr||[]};
  sessMsgs.push(msg);appendMsgEl(msg,true);saveSess(null);
}
function removeEl(id){var e=document.getElementById(id);if(e)e.remove();}
function rateRes(id,score){
  var u=curU();if(!u)return;
  var rec=u.records.find(function(r){return r.id==id;});if(rec){rec.rating=score;saveDB();}
  var el=document.getElementById('rs-'+id);if(!el)return;
  el.querySelectorAll('.star').forEach(function(s,i){s.classList.toggle('on',i<score);});
}
// ══ BOOT ══
function initApp(){var u=curU();if(!u)return;renderSB();renderMsgs([]);setModeSilent('general');}
(function boot(){
  if(!DB.cur||!DB.users.length){
    if(!DB.users.find(function(u){return u.email==='local';})){
      DB.users.push({name:'我',email:'local',pw:'',cats:[],records:[],sessions:[],favs:[]});
    }
    DB.cur='local';saveDB();
  }
  initApp();
})();
</script>
